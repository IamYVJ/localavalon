# ============================================================================
# Build & publish the Avalon server image (linux/arm64) to GHCR.
#
# Triggers only when the server or the shared engine changes, so client-only
# commits don't rebuild the image. The Pi (via Komodo) pulls
# ghcr.io/iamyvj/avalon-server:latest.
#
# Auth uses the built-in, ephemeral GITHUB_TOKEN (packages: write) — no secret
# is stored by us. After the first successful run, mark the GHCR package PUBLIC
# in its package settings so the Pi can pull without logging in.
# ============================================================================
name: Build & publish Avalon server image

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'js/state.js'
      - 'js/rules.js'
      - 'js/stats.js'
      - '.github/workflows/server.yml'
  workflow_dispatch: {}

concurrency:
  group: avalon-server-image
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          tags: |
            ghcr.io/iamyvj/avalon-server:latest
            ghcr.io/iamyvj/avalon-server:${{ github.sha }}
          build-args: |
            APP_VERSION=${{ github.sha }}
